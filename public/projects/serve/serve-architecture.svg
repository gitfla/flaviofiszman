<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 260" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">Serve architecture: indexing and conversation pipelines</title>
  <desc id="svg-desc">Two horizontal data flows. Indexing: upload text, store and enqueue, embed sentences with Cohere, store vectors in pgvector. Conversation: ask a question, embed the prompt with Cohere, run a vector similarity search filtered by writer, return a matched sentence with attribution. The embedding and vector steps are highlighted in terracotta as the semantic core.</desc>

  <style>
    .h  { font: 500 15px var(--serif, 'Fraunces','Spectral',Georgia,serif); fill: var(--ink, #1f1d1a); }
    .t  { font: 500 14px var(--sans, 'Inter',system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif); }
    .s  { font: 400 12px var(--sans, 'Inter',system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif); fill: var(--ink, #1f1d1a); fill-opacity:0.55; }
    .tn { fill: var(--ink, #1f1d1a); }
    .ta { fill: #3d5f51; }
    .box-n { fill: #f8f8f8; stroke: var(--ink, #1f1d1a); stroke-opacity:0.12; stroke-width:1; }
    .box-a { fill: #e8eeeb; stroke: #5a7a6a; stroke-opacity:0.5; stroke-width:1; }
    .arr   { stroke: var(--ink, #1f1d1a); stroke-opacity:0.4; stroke-width:1; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="260" fill="#f8f8f8"/>

  <text class="h" x="40" y="28">Indexing pipeline</text>

  <rect class="box-n" x="40"  y="40" width="140" height="56" rx="8"/>
  <text class="t tn" x="110" y="63" text-anchor="middle">Upload text</text>
  <text class="s"    x="110" y="81" text-anchor="middle">from browser</text>

  <rect class="box-n" x="192" y="40" width="140" height="56" rx="8"/>
  <text class="t tn" x="262" y="63" text-anchor="middle">Store + enqueue</text>
  <text class="s"    x="262" y="81" text-anchor="middle">GCS, Cloud Tasks</text>

  <rect class="box-a" x="344" y="40" width="140" height="56" rx="8"/>
  <text class="t ta" x="414" y="63" text-anchor="middle">Embed sentences</text>
  <text class="s"    x="414" y="81" text-anchor="middle">split + Cohere</text>

  <rect class="box-a" x="496" y="40" width="140" height="56" rx="8"/>
  <text class="t ta" x="566" y="63" text-anchor="middle">Vector store</text>
  <text class="s"    x="566" y="81" text-anchor="middle">on Supabase</text>

  <line x1="181" y1="68" x2="190" y2="68" class="arr" marker-end="url(#arrow)"/>
  <line x1="333" y1="68" x2="342" y2="68" class="arr" marker-end="url(#arrow)"/>
  <line x1="485" y1="68" x2="494" y2="68" class="arr" marker-end="url(#arrow)"/>

  <text class="h" x="40" y="128">Conversation pipeline</text>

  <rect class="box-n" x="40"  y="140" width="140" height="56" rx="8"/>
  <text class="t tn" x="110" y="163" text-anchor="middle">Ask a question</text>
  <text class="s"    x="110" y="181" text-anchor="middle">prompt + writers</text>

  <rect class="box-a" x="192" y="140" width="140" height="56" rx="8"/>
  <text class="t ta" x="262" y="163" text-anchor="middle">Embed prompt</text>
  <text class="s"    x="262" y="181" text-anchor="middle">Cohere API</text>

  <rect class="box-a" x="344" y="140" width="140" height="56" rx="8"/>
  <text class="t ta" x="414" y="163" text-anchor="middle">Vector search</text>
  <text class="s"    x="414" y="181" text-anchor="middle">by writer</text>

  <rect class="box-n" x="496" y="140" width="140" height="56" rx="8"/>
  <text class="t tn" x="566" y="163" text-anchor="middle">Return sentence</text>
  <text class="s"    x="566" y="181" text-anchor="middle">with attribution</text>

  <line x1="181" y1="168" x2="190" y2="168" class="arr" marker-end="url(#arrow)"/>
  <line x1="333" y1="168" x2="342" y2="168" class="arr" marker-end="url(#arrow)"/>
  <line x1="485" y1="168" x2="494" y2="168" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="224" width="12" height="12" rx="3" fill="#e8eeeb" stroke="#5a7a6a" stroke-opacity="0.5" stroke-width="1"/>
  <text class="s" x="58" y="234">Highlighted steps are the Cohere embeddings and pgvector search</text>
</svg>
